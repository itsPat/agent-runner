# Local dev orchestration. Frontend runs outside compose for hot reload.
services:
  cockroach:
    image: cockroachdb/cockroach:v24.2.0
    # Single-node insecure mode for local dev. DO NOT copy to prod.
    # store=type=mem keeps data in RAM — fine for dev, wipes on restart.
    command: start-single-node --insecure --store=type=mem,size=0.5
    ports:
      - "26257:26257"  # SQL
      - "8090:8080"    # Cockroach admin UI (remapped to 8090 to avoid conflict with runner)
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai:
    build:
      # Context is repo root so Docker can see apps/ai AND gen/ts.
      context: .
      dockerfile: apps/ai/Dockerfile
    environment:
      PORT: "8081"
      # Loaded from repo-root .env (docker-compose auto-loads it). Empty
      # values are allowed at boot — PlanGoal will fail with a clear
      # error until the key is set.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-}"
    ports:
      - "8081:8081"

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      AI_SERVICE_ADDR: "ai:8081"
      COCKROACH_DSN: "postgres://root@cockroach:26257/defaultdb?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      cockroach:
        condition: service_healthy
      ai:
        condition: service_started
