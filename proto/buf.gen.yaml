# What this does:
# - Uses buf's remote plugins — runs in the cloud, no local install needed. Pinned versions = reproducible builds.
# - protocolbuffers/go generates Go message types (structs).
# - grpc/go generates Go gRPC client + server stubs.
# - bufbuild/es generates TypeScript types + gRPC stubs.
# - out: ../gen/go means generated code lands in gen/go at the repo root.

version: v2
plugins:
  # --- Go ---
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: ../gen/go
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: ../gen/go
    opt: paths=source_relative

  # --- TypeScript ---
  - remote: buf.build/bufbuild/es:v2.2.0
    out: ../gen/ts
    opt:
      - target=ts
      - import_extension=js