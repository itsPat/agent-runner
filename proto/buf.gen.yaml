# What this does:
# - protocolbuffers/go generates Go message types.
# - connectrpc/go generates Go Connect handlers and clients.
# - protoc-gen-es generates TypeScript message and service descriptors.
# - protoc-gen-connect-es generates TypeScript Connect service definitions.
# - out: ../gen/* writes generated code to the repo-level gen/ directory.

version: v2
plugins:
  # --- Go ---
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: ../gen/go
    opt: paths=source_relative

  - remote: buf.build/connectrpc/go
    out: ../gen/go
    opt:
      - paths=source_relative
      - simple

  # --- TypeScript ---
  - local: protoc-gen-es
    out: ../gen/ts
    opt:
      - target=ts
      - import_extension=.js

  - local: protoc-gen-connect-es
    out: ../gen/ts
    opt:
      - target=ts
      - import_extension=.js
